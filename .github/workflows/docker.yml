name: Docker Build & Push

# Triggers:
#   push    → master: build, smoke-test, push to ghcr.io
#   tag     → v*:     same, plus tag the image with the version
#   PR      → master: build + smoke-test only (no push)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/p2poolbch

jobs:
  build:
    name: Build & smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Docker toolchain ──────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR (skipped for pull_request — no write permission)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata ────────────────────────────────────────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-,format=short

      # ── Build (load locally for smoke test) ───────────────────────────────
      # The image is always built and loaded locally so we can smoke-test it.
      # On non-PR events, a second pass pushes from the warm build cache.
      - name: Build image (local)
        id: build-local
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: p2poolbch:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Smoke tests ───────────────────────────────────────────────────────
      # NOTE: --entrypoint must be overridden for ad-hoc commands;
      #       otherwise Docker invokes /docker-entrypoint.sh which
      #       requires RPC_HOST/USER/PASS and exits 2 when they are absent.
      - name: Smoke test — PyPy can import p2pool deps
        run: |
          docker run --rm --entrypoint pypy p2poolbch:ci \
            -c "import twisted, OpenSSL, service_identity; print 'deps OK (Twisted %s)' % twisted.__version__"

      - name: Smoke test — bot venv imports
        run: |
          docker run --rm --entrypoint /opt/bot-venv/bin/python3 p2poolbch:ci \
            -c "import telegram, aiohttp, filelock; print('bot deps OK (ptb %s)' % telegram.__version__)"

      - name: Smoke test — entrypoint help
        run: |
          docker run --rm \
            -e RPC_HOST=127.0.0.1 -e RPC_USER=u -e RPC_PASS=p \
            --entrypoint pypy \
            p2poolbch:ci run_p2pool.py --help 2>&1 | head -5 || true

      # ── Push (master / tags only) ─────────────────────────────────────────
      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
